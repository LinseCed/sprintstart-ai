# DevOps area blueprint: applies to everyone working in the devops area.
scope: area:devops
version: "1"
source: authored
steps:
  - id: cluster-access
    title: Get cluster access
    description: Request and verify access to the staging and production clusters.
    requirement: required
    tags: [kubernetes, access, infra]
  - id: cicd-overview
    title: Understand the CI/CD pipeline
    description: Walk through how code ships from commit to production.
    requirement: required
    tags: [cicd, deployment]
  - id: on-call-onboarding
    title: Join the on-call rotation onboarding
    description: Learn the alerting setup, runbooks, and escalation paths.
    requirement: recommended
    min_experience: mid
    tags: [on-call, observability]
