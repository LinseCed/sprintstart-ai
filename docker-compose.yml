services:
  sprintstart-ai:
    build: .
    container_name: sprintstart-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys, urllib.error;\ntry: urllib.request.urlopen('http://localhost:8000/api/v1/health')\nexcept urllib.error.HTTPError: pass\nexcept Exception: sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
