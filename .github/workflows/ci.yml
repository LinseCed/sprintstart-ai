name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz

      - name: Verify Gitleaks
        run: ./gitleaks version

      - name: Scan repository
        run: ./gitleaks detect --verbose --redact

  quality:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff – lint
        run: uv run ruff check .

      - name: Ruff – format check
        run: uv run ruff format --check .

      - name: pyright – type check
        run: uv run pyright src/

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: pytest – run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing
